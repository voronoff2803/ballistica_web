<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1a1a2e;
    transition: opacity 0.6s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }

  #bomb-spinner { width: 96px; height: 96px; }

  #progress-wrap {
    margin-top: 24px; width: 200px; height: 4px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.35); border-radius: 2px;
    transition: width 0.3s ease;
  }

  #status {
    margin-top: 12px;
    font: 12px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.25); letter-spacing: 0.5px;
  }

  canvas.emscripten {
    display: block; width: 100%; height: 100%;
    background: #000; border: 0; outline: 0;
  }
  #output { display: none; }
</style>
</head>
<body>

<div id="loading-overlay">
  <img id="bomb-spinner" src="spinner0_preview.png" alt="">
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status">Loading...</div>
</div>

<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<textarea id="output" rows="1"></textarea>

<script>
(function() {
  var img = document.getElementById('bomb-spinner');
  var frames = [];
  for (var i = 0; i < 12; i++) frames.push('spinner' + i + '_preview.png');
  frames.forEach(function(s) { var p = new Image(); p.src = s; });
  var idx = 0;
  setInterval(function() { idx = (idx + 1) % 12; img.src = frames[idx]; }, 80);
})();

var canvasElement = document.getElementById('canvas');
var statusElement = document.getElementById('status');
var progressBar = document.getElementById('progress-bar');
var overlay = document.getElementById('loading-overlay');

canvasElement.addEventListener('webglcontextlost', function(e) {
  alert('WebGL context lost. Reload the page.'); e.preventDefault();
}, false);

var setStatus = function(text) {
  if (!text) { overlay.classList.add('hidden'); return; }
  statusElement.textContent = text;
  var m = text.match(/\((\d+(\.\d+)?)\/(\d+)\)/);
  if (m) progressBar.style.width = (parseFloat(m[1]) / parseFloat(m[3]) * 100) + '%';
};

var Module = {
  print: function() { console.log(Array.prototype.slice.call(arguments).join(' ')); },
  canvas: canvasElement,
  setStatus: setStatus,
  totalDependencies: 0,
  monitorRunDependencies: function(left) {
    this.totalDependencies = Math.max(this.totalDependencies, left);
    setStatus(left ? 'Loading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '');
  }
};
setStatus('Loading...');
window.onerror = function(msg) { setStatus('Error'); console.error(msg); };
</script>
<script async src="BallisticaKit.js"></script>
</body>
</html>
