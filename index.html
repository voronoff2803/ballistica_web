<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1a1a2e;
    transition: opacity 0.6s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }

  #bomb-spinner { width: 96px; height: 96px; }

  #progress-wrap {
    margin-top: 24px; width: 200px; height: 4px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.35); border-radius: 2px;
    transition: width 0.3s ease;
  }

  #status {
    margin-top: 12px;
    font: 12px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.25); letter-spacing: 0.5px;
  }

  canvas.emscripten {
    display: block; width: 100%; height: 100%;
    background: #000; border: 0; outline: 0;
  }

</style>
</head>
<body>

<div id="loading-overlay">
  <img id="bomb-spinner" src="spinner0_preview.png" alt="">
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status">Loading...</div>
</div>

<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>


<script>
var _spinnerInterval = (function() {
  var img = document.getElementById('bomb-spinner');
  var frames = [];
  for (var i = 0; i < 12; i++) frames.push('spinner' + i + '_preview.png');
  frames.forEach(function(s) { var p = new Image(); p.src = s; });
  var idx = 0;
  return setInterval(function() { idx = (idx + 1) % 12; img.src = frames[idx]; }, 80);
})();

var progressBar = document.getElementById('progress-bar');
var statusEl = document.getElementById('status');
var overlay = document.getElementById('loading-overlay');
var canvasEl = document.getElementById('canvas');

canvasEl.addEventListener('webglcontextlost', function(e) {
  alert('WebGL context lost. Reload the page.'); e.preventDefault();
}, false);

var PARTS = [
  'BallisticaKit.data.part.aa','BallisticaKit.data.part.ab',
  'BallisticaKit.data.part.ac','BallisticaKit.data.part.ad',
  'BallisticaKit.data.part.ae','BallisticaKit.data.part.af'
];
var TOTAL_SIZE = 244972149;

async function loadDataParts() {
  var chunks = [], loaded = 0;
  for (var i = 0; i < PARTS.length; i++) {
    statusEl.textContent = 'Downloading (' + (i + 1) + '/' + PARTS.length + ')...';
    var resp = await fetch(PARTS[i]);
    var reader = resp.body.getReader();
    var pc = [];
    while (true) {
      var r = await reader.read();
      if (r.done) break;
      pc.push(r.value);
      loaded += r.value.length;
      progressBar.style.width = (loaded / TOTAL_SIZE * 85).toFixed(0) + '%';
    }
    var sz = pc.reduce(function(a, c) { return a + c.length; }, 0);
    var buf = new Uint8Array(sz);
    var off = 0;
    for (var c of pc) { buf.set(c, off); off += c.length; }
    chunks.push(buf);
  }
  var full = new Uint8Array(loaded);
  var o = 0;
  for (var ch of chunks) { full.set(ch, o); o += ch.length; }
  return full.buffer;
}

async function startGame() {
  var dataBuffer = await loadDataParts();
  statusEl.textContent = 'Starting engine...';
  progressBar.style.width = '90%';

  window.Module = {
    canvas: canvasEl,
    locateFile: function(path) { return path; },
    getPreloadedPackage: function(name, size) {
      return dataBuffer;
    },
    print: function(text) {
      if (text.indexOf('chaos') === -1 && text.indexOf('trailing_dist') === -1)
        console.log(text);
    },
    printErr: function(text) {
      if (text.indexOf('chaos') === -1 && text.indexOf('trailing_dist') === -1
          && text.indexOf('preloading') === -1 && text.indexOf('ConvertToUncompressed') === -1
          && text.indexOf('loading texture') === -1 && text.indexOf('allocating mesh') === -1)
        console.warn(text);
    },
    onRuntimeInitialized: function() {
      progressBar.style.width = '100%';
      statusEl.textContent = '';
      clearInterval(_spinnerInterval);
      setTimeout(function() { overlay.classList.add('hidden'); }, 300);
      // Start web gamepad host after a short delay.
      setTimeout(function() {
        if (window._startGamepadHost) window._startGamepadHost();
      }, 2000);
    }
  };

  canvasEl.width = window.innerWidth;
  canvasEl.height = window.innerHeight;
  window.addEventListener('resize', function() {
    canvasEl.width = window.innerWidth;
    canvasEl.height = window.innerHeight;
  });
  window.addEventListener('beforeunload', function() {
    if (typeof FS !== 'undefined') FS.syncfs(false, function() {});
  });
  document.addEventListener('visibilitychange', function() {
    if (document.hidden && typeof FS !== 'undefined') FS.syncfs(false, function() {});
  });

  var script = document.createElement('script');
  script.src = 'BallisticaKit.js';
  document.body.appendChild(script);
}

startGame();

// =====================================================
// Web Gamepad Host (PeerJS)
// =====================================================
(function() {
  var BUTTON_MAP = { jump: 0, punch: 1, bomb: 2, throw: 3, start: 5 };
  var MENU_MAP = { start: 5, leave: 5 };
  var clients = {}; // peerId -> { conn, slot, name }

  function initPeerHost() {
    var peerScript = document.createElement('script');
    peerScript.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    peerScript.onload = function() {
      // Generate short random ID (8 chars) to keep QR code small.
      var shortId = 'bs' + Math.random().toString(36).substr(2, 6);
      var peer = new Peer(shortId);
      peer.on('open', function(id) {
        // Build short gamepad URL for compact QR code.
        var base = window.location.href.replace(/\/[^\/]*$/, '/');
        var url = base + 'g/?id=' + id;
        console.log('[gamepad] QR URL:', url);
        Module.ccall('web_set_qr_url', null, ['string'], [url]);
      });

      peer.on('connection', function(conn) {
        console.log('[gamepad] New connection from:', conn.peer);

        conn.on('open', function() {
          // Ask C++ to create a joystick for this client.
          var name = conn.metadata && conn.metadata.name ? conn.metadata.name : ('Player ' + (Object.keys(clients).length + 1));
          var slot = Module.ccall('web_gamepad_connect', 'number', ['string'], [name]);
          if (slot < 0) {
            console.warn('[gamepad] No free slots');
            conn.close();
            return;
          }
          clients[conn.peer] = { conn: conn, slot: slot, name: name };
          console.log('[gamepad] Player "' + name + '" connected to slot', slot);
        });

        conn.on('data', function(msg) {
          var c = clients[conn.peer];
          if (!c) return;

          if (msg.type === 'dpad') {
            Module.ccall('web_gamepad_axis', null, ['number','number','number'], [c.slot, 0, msg.x]);
            Module.ccall('web_gamepad_axis', null, ['number','number','number'], [c.slot, 1, msg.y]);
          } else if (msg.type === 'button') {
            var btn = BUTTON_MAP[msg.button];
            if (btn !== undefined) {
              Module.ccall('web_gamepad_button', null, ['number','number','number'], [c.slot, btn, msg.state === 'down' ? 1 : 0]);
            }
          } else if (msg.type === 'menu') {
            var mbtn = MENU_MAP[msg.button];
            if (mbtn !== undefined) {
              Module.ccall('web_gamepad_button', null, ['number','number','number'], [c.slot, mbtn, msg.state === 'down' ? 1 : 0]);
            }
          }
        });

        conn.on('close', function() {
          var c = clients[conn.peer];
          if (c) {
            Module.ccall('web_gamepad_disconnect', null, ['number'], [c.slot]);
            delete clients[conn.peer];
            }
        });

        conn.on('error', function() {
          var c = clients[conn.peer];
          if (c) {
            Module.ccall('web_gamepad_disconnect', null, ['number'], [c.slot]);
            delete clients[conn.peer];
            }
        });
      });

      peer.on('error', function(err) {
        console.warn('[gamepad] PeerJS error:', err);
      });
    };
    document.head.appendChild(peerScript);
  }

  // Start PeerJS host after engine runtime is ready.
  // We hook into the onRuntimeInitialized that's set in startGame() above.
  window._startGamepadHost = initPeerHost;
})();
</script>
</body>
</html>
