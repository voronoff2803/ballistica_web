<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1a1a2e;
    transition: opacity 0.6s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }

  #bomb-spinner { width: 96px; height: 96px; }

  #progress-wrap {
    margin-top: 24px; width: 200px; height: 4px;
    background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.35); border-radius: 2px;
    transition: width 0.3s ease;
  }

  #status {
    margin-top: 12px;
    font: 12px/1 -apple-system, sans-serif;
    color: rgba(255,255,255,0.25); letter-spacing: 0.5px;
  }

  canvas.emscripten {
    display: block; width: 100%; height: 100%;
    background: #000; border: 0; outline: 0;
  }

</style>
</head>
<body>

<div id="loading-overlay">
  <img id="bomb-spinner" src="spinner0_preview.png" alt="">
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status">Loading...</div>
</div>

<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>


<script>
var _spinnerInterval = (function() {
  var img = document.getElementById('bomb-spinner');
  var frames = [];
  for (var i = 0; i < 12; i++) frames.push('spinner' + i + '_preview.png');
  frames.forEach(function(s) { var p = new Image(); p.src = s; });
  var idx = 0;
  return setInterval(function() { idx = (idx + 1) % 12; img.src = frames[idx]; }, 80);
})();

var progressBar = document.getElementById('progress-bar');
var statusEl = document.getElementById('status');
var overlay = document.getElementById('loading-overlay');
var canvasEl = document.getElementById('canvas');

canvasEl.addEventListener('webglcontextlost', function(e) {
  alert('WebGL context lost. Reload the page.'); e.preventDefault();
}, false);

var PARTS = [
  'BallisticaKit.data.part.aa','BallisticaKit.data.part.ab',
  'BallisticaKit.data.part.ac','BallisticaKit.data.part.ad',
  'BallisticaKit.data.part.ae','BallisticaKit.data.part.af'
];
var TOTAL_SIZE = 210862847;

async function loadDataParts() {
  var chunks = [], loaded = 0;
  for (var i = 0; i < PARTS.length; i++) {
    statusEl.textContent = 'Downloading (' + (i + 1) + '/' + PARTS.length + ')...';
    var resp = await fetch(PARTS[i]);
    var reader = resp.body.getReader();
    var pc = [];
    while (true) {
      var r = await reader.read();
      if (r.done) break;
      pc.push(r.value);
      loaded += r.value.length;
      progressBar.style.width = (loaded / TOTAL_SIZE * 85).toFixed(0) + '%';
    }
    var sz = pc.reduce(function(a, c) { return a + c.length; }, 0);
    var buf = new Uint8Array(sz);
    var off = 0;
    for (var c of pc) { buf.set(c, off); off += c.length; }
    chunks.push(buf);
  }
  var full = new Uint8Array(loaded);
  var o = 0;
  for (var ch of chunks) { full.set(ch, o); o += ch.length; }
  return full.buffer;
}

async function startGame() {
  var dataBuffer = await loadDataParts();
  statusEl.textContent = 'Starting engine...';
  progressBar.style.width = '90%';

  window.Module = {
    canvas: canvasEl,
    locateFile: function(path) { return path; },
    getPreloadedPackage: function(name, size) {
      return dataBuffer;
    },
    print: function(text) {
      if (text.indexOf('chaos') === -1 && text.indexOf('trailing_dist') === -1)
        console.log(text);
    },
    printErr: function(text) {
      if (text.indexOf('chaos') === -1 && text.indexOf('trailing_dist') === -1
          && text.indexOf('preloading') === -1 && text.indexOf('ConvertToUncompressed') === -1
          && text.indexOf('loading texture') === -1 && text.indexOf('allocating mesh') === -1)
        console.warn(text);
    },
    onRuntimeInitialized: function() {
      progressBar.style.width = '100%';
      statusEl.textContent = '';
      clearInterval(_spinnerInterval);
      setTimeout(function() { overlay.classList.add('hidden'); }, 300);
      // Start web gamepad host after a short delay.
      setTimeout(function() {
        if (window._startGamepadHost) window._startGamepadHost();
      }, 2000);
      // Prevent screen sleep via Wake Lock API.
      if (navigator.wakeLock) {
        navigator.wakeLock.request('screen').catch(function() {});
        document.addEventListener('visibilitychange', function() {
          if (!document.hidden && navigator.wakeLock) {
            navigator.wakeLock.request('screen').catch(function() {});
          }
        });
      }
    }
  };

  canvasEl.width = window.innerWidth;
  canvasEl.height = window.innerHeight;
  window.addEventListener('resize', function() {
    canvasEl.width = window.innerWidth;
    canvasEl.height = window.innerHeight;
  });
  window.addEventListener('beforeunload', function() {
    if (typeof FS !== 'undefined') FS.syncfs(false, function() {});
  });
  document.addEventListener('visibilitychange', function() {
    if (document.hidden && typeof FS !== 'undefined') FS.syncfs(false, function() {});
  });

  var script = document.createElement('script');
  script.src = 'BallisticaKit.js';
  document.body.appendChild(script);
}

startGame();

// =====================================================
// Shared ICE config (STUN + metered.ca TURN)
// Used by both gamepad host and P2P multiplayer.
// =====================================================
window._iceConfig = { config: { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' }
]}};
fetch('https://ballistica.metered.live/api/v1/turn/credentials?apiKey=9677e4d2b4b1d914a0fe2e0c1310feb08c10')
  .then(function(r) { return r.json(); })
  .then(function(servers) {
    window._iceConfig = { config: { iceServers: servers } };
    console.log('[ice] TURN servers loaded:', servers.length);
  })
  .catch(function() {
    console.warn('[ice] Failed to load TURN servers, STUN only');
  });

// =====================================================
// Web Gamepad Host (PeerJS)
// =====================================================
(function() {
  var BUTTON_MAP = { jump: 0, punch: 1, bomb: 2, throw: 3, start: 5 };
  var MENU_MAP = { start: 5, leave: 5 };
  var clients = {}; // peerId -> { conn, slot, name }

  function initPeerHost() {
    var peerScript = document.createElement('script');
    peerScript.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    peerScript.onload = function() {
      // Generate short random ID (8 chars) to keep QR code small.
      var shortId = 'bs' + Math.random().toString(36).substr(2, 6);
      var peer = new Peer(shortId, window._iceConfig);
      peer.on('open', function(id) {
        // Build short gamepad URL for compact QR code.
        var base = window.location.href.replace(/\/[^\/]*$/, '/');
        var url = base + 'g/?id=' + id;
        console.log('[gamepad] QR URL:', url);
        Module.ccall('web_set_qr_url', null, ['string'], [url]);
      });

      peer.on('connection', function(conn) {
        console.log('[gamepad] New connection from:', conn.peer);

        conn.on('open', function() {
          // Ask C++ to create a joystick for this client.
          var name = conn.metadata && conn.metadata.name ? conn.metadata.name : ('Player ' + (Object.keys(clients).length + 1));
          var slot = Module.ccall('web_gamepad_connect', 'number', ['string'], [name]);
          if (slot < 0) {
            console.warn('[gamepad] No free slots');
            conn.close();
            return;
          }
          clients[conn.peer] = { conn: conn, slot: slot, name: name };
          console.log('[gamepad] Player "' + name + '" connected to slot', slot);
        });

        conn.on('data', function(msg) {
          var c = clients[conn.peer];
          if (!c) return;

          if (msg.type === 'dpad') {
            Module.ccall('web_gamepad_axis', null, ['number','number','number'], [c.slot, 0, msg.x]);
            Module.ccall('web_gamepad_axis', null, ['number','number','number'], [c.slot, 1, msg.y]);
          } else if (msg.type === 'button') {
            var btn = BUTTON_MAP[msg.button];
            if (btn !== undefined) {
              Module.ccall('web_gamepad_button', null, ['number','number','number'], [c.slot, btn, msg.state === 'down' ? 1 : 0]);
            }
          } else if (msg.type === 'menu') {
            var mbtn = MENU_MAP[msg.button];
            if (mbtn !== undefined) {
              Module.ccall('web_gamepad_button', null, ['number','number','number'], [c.slot, mbtn, msg.state === 'down' ? 1 : 0]);
            }
          }
        });

        conn.on('close', function() {
          var c = clients[conn.peer];
          if (c) {
            Module.ccall('web_gamepad_disconnect', null, ['number'], [c.slot]);
            delete clients[conn.peer];
            }
        });

        conn.on('error', function() {
          var c = clients[conn.peer];
          if (c) {
            Module.ccall('web_gamepad_disconnect', null, ['number'], [c.slot]);
            delete clients[conn.peer];
            }
        });
      });

      peer.on('error', function(err) {
        console.warn('[gamepad] PeerJS error:', err);
      });
    };
    document.head.appendChild(peerScript);
  }

  // Start PeerJS host after engine runtime is ready.
  // We hook into the onRuntimeInitialized that's set in startGame() above.
  window._startGamepadHost = initPeerHost;
})();

// =====================================================
// Hardware Gamepad Support (Browser Gamepad API)
// =====================================================
(function() {
  var pads = {};  // gamepad index -> { slot, prevButtons, prevAxes }

  window.addEventListener('gamepadconnected', function(e) {
    if (!window.Module || !Module.ccall) return;
    var gp = e.gamepad;
    var name = gp.id.substring(0, 30) || ('Gamepad ' + gp.index);
    var slot = Module.ccall('web_gamepad_connect', 'number', ['string'], [name]);
    if (slot < 0) return;
    pads[gp.index] = {
      slot: slot,
      prevButtons: new Array(gp.buttons.length).fill(0),
      prevAxes: new Array(gp.axes.length).fill(0),
    };
    console.log('[gamepad] Hardware connected:', name, 'slot', slot);
  });

  window.addEventListener('gamepaddisconnected', function(e) {
    var p = pads[e.gamepad.index];
    if (!p) return;
    Module.ccall('web_gamepad_disconnect', null, ['number'], [p.slot]);
    delete pads[e.gamepad.index];
    console.log('[gamepad] Hardware disconnected:', e.gamepad.id);
  });

  // Standard Gamepad button mapping -> engine button index.
  // https://w3c.github.io/gamepad/#remapping
  var BTN_MAP = {
    0: 0,   // A/Cross -> Jump
    1: 2,   // B/Circle -> Bomb
    2: 1,   // X/Square -> Punch
    3: 3,   // Y/Triangle -> Throw
    8: 5,   // Back/Select -> Menu
    9: 5,   // Start -> Menu
    4: 64,  // LB -> Run
    5: 64,  // RB -> Run
  };

  function pollGamepads() {
    var gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (var i = 0; i < gamepads.length; i++) {
      var gp = gamepads[i];
      if (!gp) continue;
      var p = pads[gp.index];
      if (!p) continue;

      // Buttons.
      for (var b = 0; b < gp.buttons.length; b++) {
        var pressed = gp.buttons[b].pressed ? 1 : 0;
        if (pressed !== p.prevButtons[b]) {
          p.prevButtons[b] = pressed;
          var mapped = BTN_MAP[b];
          if (mapped !== undefined) {
            Module.ccall('web_gamepad_button', null,
              ['number','number','number'], [p.slot, mapped, pressed]);
          }
        }
      }

      // Axes (0=LStickX, 1=LStickY, typically).
      for (var a = 0; a < Math.min(gp.axes.length, 2); a++) {
        var val = gp.axes[a];
        // Apply small deadzone.
        if (Math.abs(val) < 0.08) val = 0;
        if (Math.abs(val - p.prevAxes[a]) > 0.01) {
          p.prevAxes[a] = val;
          Module.ccall('web_gamepad_axis', null,
            ['number','number','number'], [p.slot, a, val]);
        }
      }
    }
    requestAnimationFrame(pollGamepads);
  }

  // Start polling once engine is ready.
  var origStart = window._startGamepadHost;
  window._startGamepadHost = function() {
    if (origStart) origStart();
    requestAnimationFrame(pollGamepads);
  };
})();

// =====================================================
// P2P Network Bridge (WebRTC via PeerJS)
// =====================================================
(function() {
  var gameConn = null;  // active DataChannel connection for game packets
  var hostPeer = null;  // PeerJS instance when hosting

  function feedPacket(data) {
    if (!(data instanceof ArrayBuffer)) return;
    var arr = new Uint8Array(data);
    Module.ccall('web_net_incoming', null, ['array', 'number'], [arr, arr.length]);
  }

  // Called from EM_ASM with a Uint8Array copy of the packet data.
  window._wsNetSend = function(data) {
    if (!gameConn || !gameConn.open) return;
    gameConn.send(data.buffer);
  };

  // Host: start accepting P2P game connections.
  window.startP2PHost = function(callback) {
    if (hostPeer) { hostPeer.destroy(); hostPeer = null; }

    var id = 'bs' + Math.random().toString(36).substr(2, 8);
    console.log('[p2p] Creating host peer:', id);
    hostPeer = new Peer(id, window._iceConfig);

    hostPeer.on('open', function(peerId) {
      console.log('[p2p] Signaling ready, hosting as', peerId);
      if (callback) callback(peerId);
    });
    hostPeer.on('disconnected', function() {
      console.warn('[p2p] Host lost signaling server');
    });

    hostPeer.on('connection', function(conn) {
      console.log('[p2p] Incoming connection from', conn.peer);
      conn.on('open', function() {
        console.log('[p2p] DataChannel open with', conn.peer);
        gameConn = conn;
      });
      conn.on('data', function(data) { feedPacket(data); });
      conn.on('close', function() {
        console.log('[p2p] DataChannel closed');
        if (gameConn === conn) gameConn = null;
      });
      conn.on('error', function(err) {
        console.warn('[p2p] DataChannel error:', err.type || err);
      });
      conn.peerConnection.oniceconnectionstatechange = function() {
        console.log('[p2p] ICE state:', conn.peerConnection.iceConnectionState);
      };
    });

    hostPeer.on('error', function(err) {
      console.warn('[p2p] Host error:', err.type, err.message || '');
    });
  };

  // Client: connect to a host by invite code.
  window.joinP2P = function(code, callback) {
    if (gameConn) { gameConn.close(); gameConn = null; }

    console.log('[p2p] Creating client peer');
    var peer = new Peer(window._iceConfig);
    peer.on('open', function(myId) {
      console.log('[p2p] Signaling ready as', myId, '→ joining', code);
      var conn = peer.connect(code, { reliable: true, serialization: 'binary' });

      conn.on('open', function() {
        console.log('[p2p] DataChannel open');
        gameConn = conn;
        if (callback) callback(true);
      });
      conn.on('data', function(data) { feedPacket(data); });
      conn.on('close', function() {
        console.log('[p2p] DataChannel closed');
        gameConn = null;
      });
      conn.on('error', function(err) {
        console.warn('[p2p] DataChannel error:', err.type || err);
        if (callback) { callback(false); callback = null; }
      });

      // Log ICE negotiation progress via event listener.
      var iceLogged = {};
      var iceCheck = setInterval(function() {
        var pc = conn.peerConnection;
        if (!pc) return;
        clearInterval(iceCheck);
        pc.oniceconnectionstatechange = function() {
          var s = pc.iceConnectionState;
          if (!iceLogged[s]) {
            iceLogged[s] = true;
            console.log('[p2p] ICE:', s);
            if (s === 'failed') {
              console.warn('[p2p] NAT traversal failed — need TURN server');
              if (callback) { callback(false); callback = null; }
            }
          }
        };
        pc.onicegatheringstatechange = function() {
          console.log('[p2p] ICE gathering:', pc.iceGatheringState);
        };
        console.log('[p2p] ICE negotiation started');
      }, 100);
    });
    peer.on('disconnected', function() {
      console.warn('[p2p] Client lost signaling server');
    });
    peer.on('error', function(err) {
      console.warn('[p2p] Peer error:', err.type, err.message || '');
      if (callback) { callback(false); callback = null; }
    });
  };

  window.disconnectP2P = function() {
    if (gameConn) { gameConn.close(); gameConn = null; }
    if (hostPeer) { hostPeer.destroy(); hostPeer = null; }
  };

  // Store join code from URL for Python to pick up.
  var params = new URLSearchParams(window.location.search);
  var joinCode = params.get('join');
  if (joinCode) {
    window._autoJoinCode = joinCode;
    console.log('[p2p] Will auto-join:', joinCode);
  }
})();
</script>
</body>
</html>
